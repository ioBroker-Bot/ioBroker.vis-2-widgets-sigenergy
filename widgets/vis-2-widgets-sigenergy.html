<!--

    4 Sigenergy-Widgets fuer Solarenergieanlagen:

<link rel="stylesheet" href="widgets/vis-2-widgets-sigenergy/css/style.css" />
<script type="text/javascript" src="widgets/vis-2-widgets-sigenergy/js/vis-2-widgets-sigenergy.js"></script>


<!-- ===============================================================
     WIDGET 1 — Energiefluss-Diagramm
     Zeigt PV / Batterie / Netz / Haus mit animierten SVG-Pfeilen
     =============================================================== -->
<script id="tplSigenergyEnergyFlow"
        type="text/ejs"
        class="vis-tpl"
        data-vis-set="vis-2-widgets-sigenergy"
        data-vis-name="Energiefluss-Diagramm"
        data-vis-type="val"
        data-vis-prev='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:14px;width:320px;height:260px;font-family:sans-serif;color:#e0e6ef;box-sizing:border-box"><div style="font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;opacity:.6;text-align:center;margin-bottom:8px">&#9889; Energiefluss</div><div style="display:grid;grid-template-columns:1fr 40px 1fr;grid-template-rows:1fr 1fr;gap:12px;margin-top:16px"><div style="text-align:center"><div style="font-size:1.6rem">&#9728;</div><div style="font-size:.58rem;opacity:.55;margin-top:2px">Solar PV</div><div style="font-size:.88rem;font-weight:700;color:#f39c12">3.20 kW</div></div><div style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;opacity:.4">&#9889;</div><div style="text-align:center"><div style="font-size:1.6rem">&#128267;</div><div style="font-size:.58rem;opacity:.55;margin-top:2px">Batterie</div><div style="font-size:.88rem;font-weight:700;color:#9b59b6">1.50 kW</div></div><div style="text-align:center"><div style="font-size:1.6rem">&#128268;</div><div style="font-size:.58rem;opacity:.55;margin-top:2px">Netz</div><div style="font-size:.88rem;font-weight:700;color:#3498db">0.00 kW</div></div><div></div><div style="text-align:center"><div style="font-size:1.6rem">&#127968;</div><div style="font-size:.58rem;opacity:.55;margin-top:2px">Haus</div><div style="font-size:.88rem;font-weight:700;color:#27ae60">1.70 kW</div></div></div></div>'
        data-vis-attrs="group.OIDs;oid_pv[sigenergy.0.plant.pvPower]/id;oid_bat[sigenergy.0.plant.essPower]/id;oid_grid[sigenergy.0.plant.gridActivePower]/id;oid_house[sigenergy.0.statistics.housePower]/id;oid_soc[sigenergy.0.plant.essSoc]/id;group.Darstellung;sig_title[Energiefluss]/text;sig_darkmode[true]/checkbox;sig_animation[true]/checkbox">
    <div class="vis-widget <%== this.data.attr('class') %>" style="overflow:visible; width:340px; height:270px;" id="<%= this.data.attr('wid') %>"><%
        vis.binds['vis-2-widgets-sigenergy'].createEnergyFlow(this.data.attr('wid'), this.view, this.data, this.style);
    %></div>
</script>


<!-- ===============================================================
     WIDGET 2 — Akku-Status & Prognosen

     =============================================================== -->
<script id="tplSigenergyBatteryStatus"
        type="text/ejs"
        class="vis-tpl"
        data-vis-set="vis-2-widgets-sigenergy"
        data-vis-name="Akku-Status &amp; Prognosen"
        data-vis-type="val"
        data-vis-prev='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:14px;width:290px;height:300px;font-family:sans-serif;color:#e0e6ef;box-sizing:border-box"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:1.1rem">&#128267;</span><span style="font-size:.9rem;font-weight:600">Batterie Status</span><span style="margin-left:auto;font-size:.58rem;opacity:.55;background:rgba(255,255,255,.1);padding:2px 7px;border-radius:4px">SOH: 98%</span></div><div style="font-size:2.5rem;font-weight:700;text-align:center;color:#27ae60;margin-bottom:7px">74%</div><div style="background:rgba(255,255,255,.1);border-radius:6px;height:10px;margin-bottom:4px;overflow:hidden"><div style="width:74%;height:100%;border-radius:6px;background:#27ae60"></div></div><div style="display:flex;justify-content:space-between;font-size:.52rem;opacity:.4;margin-bottom:10px"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.56rem;opacity:.6;margin-bottom:3px">&#9889; Leistung</div><div style="font-size:.88rem;font-weight:700;color:#f39c12">1.50 kW</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.56rem;opacity:.6;margin-bottom:3px">&#8987; Bis Voll</div><div style="font-size:.88rem;font-weight:700">1h 42m</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.56rem;opacity:.6;margin-bottom:3px">&#9203; Restlaufzeit</div><div style="font-size:.88rem;font-weight:700">4h 20m</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.56rem;opacity:.6;margin-bottom:3px">&#9728; Eigenverbrauch</div><div style="font-size:.88rem;font-weight:700">87%</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.56rem;opacity:.6;margin-bottom:3px">&#127969; Autarkierate</div><div style="font-size:.88rem;font-weight:700">82%</div></div></div></div>'
        data-vis-attrs="group.OIDs;oid_soc[sigenergy.0.plant.essSoc]/id;oid_soh[sigenergy.0.plant.essSoh]/id;oid_bat[sigenergy.0.plant.essPower]/id;oid_ttf[sigenergy.0.statistics.batteryTimeToFull]/id;oid_ttr[sigenergy.0.statistics.batteryTimeRemaining]/id;oid_sc[sigenergy.0.statistics.selfConsumptionRate]/id;oid_aut[sigenergy.0.statistics.autarkyRate]/id;group.Darstellung;sig_darkmode[true]/checkbox">
    <div class="vis-widget <%== this.data.attr('class') %>" style="overflow:visible; width:300px; height:320px;" id="<%= this.data.attr('wid') %>"><%
        vis.binds['vis-2-widgets-sigenergy'].createBatteryStatus(this.data.attr('wid'), this.view, this.data, this.style);
    %></div>
</script>

     =============================================================== -->

ing:7px 0;display:flex;justify-content:space-between;align-items:center"><span style="display:flex;align-items:center;gap:8px;font-size:.8rem"><span style="width:9px;height:9px;border-radius:50%;background:#8e44ad;display:inline-block"></span>&#128267; SOC</span><span style="font-size:.85rem;font-weight:700">74%</span></div></div>'

        data-vis-name="Energiestatistiken"
        data-vis-type="val"
        data-vis-prev='<div style="background:#fff;border-radius:14px;padding:14px;width:290px;height:310px;font-family:sans-serif;color:#2c3e50;box-sizing:border-box;border:1px solid #e8eef5"><div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;opacity:.6;margin-bottom:10px">&#128202; Tagesstatistik</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><div style="background:#f7f9fc;border:1px solid #e8eef5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:.54rem;opacity:.6;text-transform:uppercase;margin-bottom:4px">&#127969; Autarkie</div><div style="font-size:1.2rem;font-weight:700;color:#27ae60">82%</div></div><div style="background:#f7f9fc;border:1px solid #e8eef5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:.54rem;opacity:.6;text-transform:uppercase;margin-bottom:4px">&#8635; Eigenverbrauch</div><div style="font-size:1.2rem;font-weight:700;color:#9b59b6">94%</div></div><div style="background:#f7f9fc;border:1px solid #e8eef5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:.54rem;opacity:.6;text-transform:uppercase;margin-bottom:4px">&#8593; Max SOC</div><div style="font-size:1.2rem;font-weight:700;color:#f39c12">98%</div></div><div style="background:#f7f9fc;border:1px solid #e8eef5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:.54rem;opacity:.6;text-transform:uppercase;margin-bottom:4px">&#8595; Min SOC</div><div style="font-size:1.2rem;font-weight:700;color:#3498db">21%</div></div><div style="background:#f7f9fc;border:1px solid #e8eef5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:.54rem;opacity:.6;text-transform:uppercase;margin-bottom:4px">&#11014; Tages-Ladung</div><div style="font-size:1.2rem;font-weight:700;color:#16a085">8.4 kWh</div></div><div style="background:#f7f9fc;border:1px solid #e8eef5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:.54rem;opacity:.6;text-transform:uppercase;margin-bottom:4px">&#11015; Entladung</div><div style="font-size:1.2rem;font-weight:700;color:#e74c3c">7.1 kWh</div></div></div></div>'
